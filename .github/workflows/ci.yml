name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: cds_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d cds_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_DSN: postgres://postgres:password@localhost:5432/cds_test?sslmode=disable

    defaults:
      run:
        working-directory: cds_service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download dependencies
        run: go mod download

      - name: Verify build
        run: go build ./...

      - name: Run vet
        run: go vet ./...

      - name: Run tests
        run: go test ./... -v
